<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>
</head>
<body>

<header>
    <h1>Sistema Help Desk</h1>
    <p>Universidad Técnica de Manabí</p>
    <p>Desarrollo de Sistemas Informáticos</p>
</header>

<nav>
    <a href="index.html">Inicio</a> |
    <a href="reportar.html">Reportar Incidente</a> |
    <a href="tickets.html">Tickets</a>
</nav>

<main>

    <section>
        <h2>Registro de Incidentes</h2>

        <form>

            <p>
                <label for="titulo">Título del incidente:</label><br>
                <input type="text"
                       id="titulo"
                       name="titulo"
                       required
                       minlength="5">
            </p>

            <p>
                <label for="categoria">Categoría:</label><br>

                <select id="categoria" name="categoria" required>
                    <option value="">Seleccione una categoría</option>
                    <option value="Red">Red</option>
                    <option value="Hardware">Hardware</option>
                    <option value="Software">Software</option>
                </select>
            </p>

            <fieldset>
                <legend>Prioridad</legend>

                <input type="radio" id="alta" name="prioridad" value="Alta" required>
                <label for="alta">Alta</label>

                <input type="radio" id="media" name="prioridad" value="Media">
                <label for="media">Media</label>

                <input type="radio" id="baja" name="prioridad" value="Baja">
                <label for="baja">Baja</label>
            </fieldset>

            <p>
                <label for="descripcion">Descripción:</label><br>

                <textarea id="descripcion"
                          name="descripcion"
                          rows="5"
                          cols="40"
                          required></textarea>
            </p>

            <p>
                <input type="submit" value="Enviar Incidente">
                <input type="reset" value="Limpiar">
            </p>

        </form>

    </section>

</main>

<footer>
    <p>© 2026 Sistema Help Desk - Universidad Técnica de Manabí</p>
</footer>

</body>
</html>
