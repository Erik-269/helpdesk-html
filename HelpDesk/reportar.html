<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>
</head>
<body>

<header>
    <h1>Sistema Help Desk</h1>
</header>

<nav>
    <a href="index.html">Inicio</a> |
    <a href="reportar.html">Reportar Incidente</a> |
    <a href="tickets.html">Tickets</a>
</nav>

<main>

<section>
    <h2>Registro de Incidentes</h2>

    <form>

        <label for="titulo">Título del incidente:</label>
        <br>
        <input type="text" id="titulo" name="titulo">

        <br><br>

        <label for="categoria">Categoría:</label>
        <br>
        <select id="categoria">
            <option>Red</option>
            <option>Hardware</option>
            <option>Software</option>
        </select>

        <br><br>

        <label>Prioridad:</label>
        <br>

        <input type="radio" name="prioridad"> Alta
        <input type="radio" name="prioridad"> Media
        <input type="radio" name="prioridad"> Baja

        <br><br>

        <label for="descripcion">Descripción:</label>
        <br>

        <textarea id="descripcion" rows="5" cols="40"></textarea>

        <br><br>

        <input type="submit" value="Enviar">

    </form>

</section>

</main>

<footer>
    <p>© 2026 Sistema Help Desk</p>
</footer>

</body>
</html>
